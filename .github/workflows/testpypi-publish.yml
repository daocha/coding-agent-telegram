# This workflow will upload a Python package to TestPyPI for dev tags.

name: Upload Python Package to TestPyPI

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.dev*"

permissions:
  contents: read

jobs:
  release-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Verify TestPyPI version
        run: |
          python -m pip install setuptools-scm
          VERSION="$(python -m setuptools_scm)"
          echo "Derived version: $VERSION"
          if [[ "$VERSION" != *".dev"* ]]; then
            echo "TestPyPI publishing requires a .dev version." >&2
            exit 1
          fi

      - name: Run tests
        run: |
          python -m pip install pytest
          python -m pip install -e .
          pytest

      - name: Build release distributions
        run: |
          python -m pip install build
          python -m build

      - name: Smoke test built wheel
        run: |
          python -m venv .smoke-test-venv
          source .smoke-test-venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install --no-deps dist/*.whl
          python -c "import coding_agent_telegram"

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: release-dists
          path: dist/

  testpypi-publish:
    runs-on: ubuntu-latest
    needs:
      - release-build
    permissions:
      id-token: write
    environment:
      name: testpypi
      # OPTIONAL: uncomment and update to include your TestPyPI project URL in the deployment status:
      # url: https://test.pypi.org/project/coding-agent-telegram/

    steps:
      - name: Retrieve release distributions
        uses: actions/download-artifact@v4
        with:
          name: release-dists
          path: dist/

      - name: Publish release distributions to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/
